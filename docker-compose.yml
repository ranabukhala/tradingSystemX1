  # ══════════════════════════════════════════════════════════
  #  LAYER 10 — PRE-TRADE FILTERS (Phase 5)
  # ══════════════════════════════════════════════════════════

  regime_poller:
    <<: *connector
    container_name: trading_regime_poller
    entrypoint: ["python", "-m", "app.filters"]
    command: ["regime"]
    environment:
      SERVICE_NAME: regime_poller
      METRICS_PORT: "8073"
      POLYGON_API_KEY: ${POLYGON_API_KEY:-}
      REDIS_URL: redis://redis:6379/0
      REGIME_POLL_INTERVAL: "300"
    ports:
      - "8073:8073"
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 30s

  pretrade_filter:
    <<: *connector
    container_name: trading_pretrade_filter
    entrypoint: ["python", "-m", "app.filters"]
    command: ["pretrade"]
    environment:
      SERVICE_NAME: pretrade_filter
      METRICS_PORT: "8074"
      KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
      REDIS_URL: redis://redis:6379/0
      POLYGON_API_KEY: ${POLYGON_API_KEY:-}
      UNUSUAL_WHALES_API_KEY: ${UNUSUAL_WHALES_API_KEY:-}
      TRADIER_API_KEY: ${TRADIER_API_KEY:-}
      IEX_API_KEY: ${IEX_API_KEY:-}
      FINVIZ_API_KEY: ${FINVIZ_API_KEY:-}
      DATABASE_URL: postgresql://${POSTGRES_USER:-trading}:${POSTGRES_PASSWORD:-tradingpass}@postgres:5432/${POSTGRES_DB:-trading_db}
      USE_PRETRADE_FILTER: "true"
      TECHNICAL_SCORE_THRESHOLD: "7"    # 0-10 composite score; min to pass filter (static fallback)
      CONTEXT_SERVICE_URL: "http://stock_context_service:8082"  # dynamic threshold source
    ports:
      - "8074:8074"
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  # ══════════════════════════════════════════════════════════
  #  MARKET HOURS SCHEDULER
  #  Starts/stops trading services on NYSE open/close via Docker SDK.
  #  Always running — independent of market hours.
  # ══════════════════════════════════════════════════════════

  scheduler:
    <<: *connector
    container_name: trading_scheduler
    restart: always                        # Must always be up, overrides unless-stopped
    entrypoint: ["python", "-m", "app.scheduler"]
    environment:
      SERVICE_NAME: scheduler
      # Market open/close times (US/Eastern). Defaults: 08:00 – 16:30.
      MARKET_OPEN_HOUR:  ${MARKET_OPEN_HOUR:-8}
      MARKET_OPEN_MIN:   ${MARKET_OPEN_MIN:-0}
      MARKET_CLOSE_HOUR: ${MARKET_CLOSE_HOUR:-16}
      MARKET_CLOSE_MIN:  ${MARKET_CLOSE_MIN:-30}
      # Earnings-window: keep services running around BMO/AMC earnings events.
      EARNINGS_WINDOW_BEFORE_MIN: ${EARNINGS_WINDOW_BEFORE_MIN:-90}
      EARNINGS_WINDOW_AFTER_MIN:  ${EARNINGS_WINDOW_AFTER_MIN:-120}
      # Postgres direct params for psycopg2 (scheduler can't use asyncpg URL).
      POSTGRES_HOST:     postgres
      POSTGRES_PORT:     "5432"
      POSTGRES_USER:     ${POSTGRES_USER:-trading}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tradingpass}
      POSTGRES_DB:       ${POSTGRES_DB:-trading_db}
    volumes:
      - ./app:/app/app                           # live code mount (from *connector)
      - ./config:/app/config                     # watchlist etc.  (from *connector)
      - /var/run/docker.sock:/var/run/docker.sock # Docker socket — required for SDK
    depends_on:                                  # Override *connector (no migrate/topic_setup needed)
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import docker; docker.from_env().ping()"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 15s

# ══════════════════════════════════════════════════════════
#  STOCK CONTEXT CLASSIFIER
#  Pre-computes trend/volatility/cleanliness regime per ticker.
#  Exposes /health and /context/{ticker} on port 8082.
#  Uses its own Dockerfile (not the shared image).
# ══════════════════════════════════════════════════════════

  stock_context_service:
    build:
      context: .
      dockerfile: stock_context_service/Dockerfile
    container_name: trading_stock_context
    restart: unless-stopped
    env_file: .env
    environment:
      POLYGON_API_KEY:            ${POLYGON_API_KEY}
      REDIS_URL:                  redis://redis:6379/0
      DATABASE_URL:               postgresql://${POSTGRES_USER:-trading}:${POSTGRES_PASSWORD:-tradingpass}@postgres:5432/${POSTGRES_DB:-trading_db}
      WATCHLIST_TICKERS:          ${WATCHLIST_TICKERS:-}
      TECHNICAL_SCORE_THRESHOLD:  ${TECHNICAL_SCORE_THRESHOLD:-7}
      LOG_LEVEL:                  ${LOG_LEVEL:-INFO}
      TZ:                         America/New_York
    ports:
      - "8082:8082"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8082/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - trading_net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# ══════════════════════════════════════════════════════════
#  VOLATILITY MONITOR
#  Polls VXX/UVXY from Polygon, classifies vol regime,
#  caches in Redis, publishes changes to Redpanda.
#  Exposes /health and /regime on port 8083.
# ══════════════════════════════════════════════════════════

  volatility_monitor:
    build:
      context: .
      dockerfile: volatility_monitor_service/Dockerfile
    container_name: trading_volatility_monitor
    restart: unless-stopped
    env_file: .env
    environment:
      POLYGON_API_KEY:         ${POLYGON_API_KEY}
      REDIS_URL:               redis://redis:6379/0
      KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
      LOG_LEVEL:               ${LOG_LEVEL:-INFO}
      TZ:                      America/New_York
    ports:
      - "8083:8083"
    depends_on:
      redis:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8083/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - trading_net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# ══════════════════════════════════════════════════════════
#  VOLUMES & NETWORKS
# ══════════════════════════════════════════════════════════

volumes:
  postgres_data:
  redis_data:
  redpanda_data:
  minio_data:
  prometheus_data:
  grafana_data:

networks:
  trading_net:
    driver: bridge